<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ayanxars</title>
    <style>
        html {
            color-scheme: dark;
        }

        body {
            background: #000;
            color: #fff;
            margin: 0;
            padding: 2rem;
            text-align: center;
            font-family: Arial, sans-serif;
            text-transform: lowercase;
        }

        a {
            color: #fff;
            text-transform: lowercase;
            text-decoration: none;
        }
    </style>
</head>

<body><br>
    <font size="6">ayanxars</font><br><br><br>
    <p><a href="https://x.com/ayanxars" rel="noopener noreferrer">x</a></p><br>
    <p><a href="https://instagram.com/ayanxars" rel="noopener noreferrer">ig</a></p><br>
    <p><a href="https://github.com/ayanxars" rel="noopener noreferrer">git</a></p><br>
    <div id="jsonLoader"></div>
    <script>
        async function loadLinks() {
            const bust = Date.now() + '_' + (crypto.randomUUID ? crypto.randomUUID() : Math.random());
            const url = 'https://raw.githubusercontent.com/AyanXars/ayanxars/refs/heads/main/url.json?t=' + encodeURIComponent(bust);
            try {
                const response = await fetch(url, {
                    cache: 'no-store',
                    method: 'GET'
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const links = await response.json();
                if (document.readyState === 'loading') {
                    await new Promise(r => document.addEventListener('DOMContentLoaded', r));
                }
                const container = document.getElementById('jsonLoader');
                links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.textContent = link.name;
                    const p = document.createElement('p');
                    p.appendChild(a);
                    container.appendChild(p);
                });
            } catch (e) {
                console.error('Error loading links:', e);
            }
        }
        loadLinks();
    </script>
    <br>
</body>

</html>
